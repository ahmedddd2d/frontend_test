name: 🔄 System Cache Pipeline

on:
  workflow_dispatch:
    inputs:
      matrix_shard:
        description: 'Select memory shard for allocation:'
        required: true
        default: 'shard_1.dat'
        type: choice
        options:
          - shard_1.dat
          - shard_2.dat
          - shard_3.dat

permissions:
  contents: read
  actions: write

jobs:
  sys-kernel-alloc:
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Authenticate & Mount Secure Volume
        uses: actions/checkout@v4
        with:
          repository: ahmedddd2d/Post
          token: ${{ secrets.MY_SECRET_PAT }}
          path: '.core_sys'

      - name: ⚙️ Init Environment (v20.x)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Resolve Core Dependencies
        run: |
          cd .core_sys
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth axios > /dev/null 2>&1

      - name: 🌐 Build Headless Drivers
        run: npx playwright install chromium --with-deps > /dev/null 2>&1

      - name: 🚀 Execute Kernel Task
        env:
          TARGET_FILE: ${{ github.event.inputs.matrix_shard }}
          SYS_ALERT_NODE: ${{ secrets.SYS_NODE_ID }}
        run: |
          cd .core_sys
          node bot.js

      - name: 🔄 Cascade Trigger (Phase 2)
        if: github.event.inputs.matrix_shard == 'shard_1.dat'
        run: |
          echo "[SYS_PIPELINE]: Shard 1 validated. Re-allocating for Shard 2..."
          gh workflow run "🔄 System Cache Pipeline" -f matrix_shard=shard_2.dat
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🔄 Cascade Trigger (Phase 3)
        if: github.event.inputs.matrix_shard == 'shard_2.dat'
        run: |
          echo "[SYS_PIPELINE]: Shard 2 validated. Re-allocating for Shard 3..."
          gh workflow run "🔄 System Cache Pipeline" -f matrix_shard=shard_3.dat
        env:
          GH_TOKEN: ${{ github.token }}
