name: 🔄 System Cache Pipeline

on:
  workflow_dispatch:
    inputs:
      matrix_shard:
        description: 'Select memory shard for allocation:'
        required: true
        default: 'shard_1.dat'
        type: choice
        options:
          - shard_1.dat
          - shard_2.dat
          - shard_3.dat
          - shard_4.dat
          - shard_5.dat
          - shard_6.dat
          - shard_7.dat
          - shard_8.dat

permissions:
  contents: write 
  actions: write

jobs:
  sys-kernel-alloc:
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Authenticate & Mount Secure Volume
        uses: actions/checkout@v4
        with:
          repository: ahmedddd2d/Post
          token: ${{ secrets.MY_SECRET_PAT }}
          path: '.core_sys'
          persist-credentials: true 

      - name: ⚙️ Init Environment (v20.x)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Resolve Core Dependencies
        run: |
          cd .core_sys
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth axios form-data ghost-cursor > /dev/null 2>&1

      - name: 🌐 Build Headless Drivers
        run: npx playwright install chromium --with-deps > /dev/null 2>&1

      - name: 🛡️ Allocate Network Shard (WARP)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cf-archive-keyring.gpg > /dev/null 2>&1
          echo "deb [signed-by=/usr/share/keyrings/cf-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cf-client.list > /dev/null 2>&1
          sudo apt-get update > /dev/null 2>&1 && sudo apt-get install cloudflare-warp -y > /dev/null 2>&1
          warp-cli --accept-tos register > /dev/null 2>&1 || warp-cli --accept-tos registration new > /dev/null 2>&1
          warp-cli --accept-tos connect > /dev/null 2>&1
          sleep 5

      - name: 🚀 Execute Kernel Task
        env:
          TARGET_FILE: ${{ github.event.inputs.matrix_shard }}
          SYS_ALERT_NODE: ${{ secrets.SYS_NODE_ID }}
        run: |
          cd .core_sys
          node bot.js

      - name: 💾 Save & Push Updated State (Refuel)
        run: |
          cd .core_sys
          git config --global user.name "Submarine-Bot"
          git config --global user.email "bot@submarine.io"
          
          git add state.json
          
          if ! git diff --staged --quiet; then
            git commit -m "🔄 [Auto] Refresh security state - ${{ github.event.inputs.matrix_shard }} [skip ci]"
            git pull origin main --rebase || true
            git push origin HEAD:main
          else
            echo "✅ Cache integrity verified. No state mutation detected."
          fi

      - name: 🔄 Smart Cascade Trigger (With Jitter Delay)
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_SHARD: ${{ github.event.inputs.matrix_shard }}
        run: |
          # Extract current sequence index
          CURRENT_NUM=$(echo "$CURRENT_SHARD" | grep -o -E '[0-9]+')
          
          # Validate pipeline boundary
          if [ "$CURRENT_NUM" -lt 8 ]; then
            NEXT_NUM=$((CURRENT_NUM + 1))
            NEXT_SHARD="shard_${NEXT_NUM}.dat"
            
            # Determine cache synchronization delay
            SHOULD_DELAY=$((RANDOM % 2))
            
            if [ "$SHOULD_DELAY" -eq 1 ]; then
              # Calculate jitter window (900s - 1800s)
              DELAY_SECONDS=$((900 + RANDOM % 901))
              DELAY_MINS=$((DELAY_SECONDS / 60))
              echo "[SYS_PIPELINE]: Stage $CURRENT_NUM complete. Allocating $DELAY_MINS minutes for sync before initiating $NEXT_SHARD..."
              sleep $DELAY_SECONDS
            else
              echo "[SYS_PIPELINE]: Stage $CURRENT_NUM complete. Initiating $NEXT_SHARD immediately..."
            fi
            
            # Execute next pipeline stage
            gh workflow run "🔄 System Cache Pipeline" -f matrix_shard=$NEXT_SHARD --repo ${{ github.repository }}
          else
            echo "✅ Pipeline sequence complete. Reached terminal shard ($CURRENT_SHARD)."
          fi
