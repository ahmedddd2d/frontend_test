name: 🔄 System Cache Pipeline

on:
  workflow_dispatch:
    inputs:
      matrix_shard:
        description: 'Select memory shard for allocation:'
        required: true
        default: 'shard_1.dat'
        type: choice
        options:
          - shard_1.dat
          - shard_2.dat
          - shard_3.dat

permissions:
  contents: write 
  actions: write

jobs:
  sys-kernel-alloc:
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Authenticate & Mount Secure Volume
        uses: actions/checkout@v4
        with:
          repository: ahmedddd2d/Post
          token: ${{ secrets.MY_SECRET_PAT }}
          path: '.core_sys'
          persist-credentials: true 

      - name: ⚙️ Init Environment (v20.x)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Resolve Core Dependencies
        run: |
          cd .core_sys
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth axios form-data ghost-cursor > /dev/null 2>&1

      - name: 🌐 Build Headless Drivers
        run: npx playwright install chromium --with-deps > /dev/null 2>&1

      - name: 🛡️ Allocate Network Shard (WARP)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cf-archive-keyring.gpg > /dev/null 2>&1
          echo "deb [signed-by=/usr/share/keyrings/cf-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cf-client.list > /dev/null 2>&1
          sudo apt-get update > /dev/null 2>&1 && sudo apt-get install cloudflare-warp -y > /dev/null 2>&1
          warp-cli --accept-tos register > /dev/null 2>&1 || warp-cli --accept-tos registration new > /dev/null 2>&1
          warp-cli --accept-tos connect > /dev/null 2>&1
          sleep 5

      - name: 🚀 Execute Kernel Task
        env:
          TARGET_FILE: ${{ github.event.inputs.matrix_shard }}
          SYS_ALERT_NODE: ${{ secrets.SYS_NODE_ID }}
        run: |
          cd .core_sys
          node bot.js

      - name: 💾 Save & Push Updated State (Refuel)
        run: |
          cd .core_sys
          git config --global user.name "Submarine-Bot"
          git config --global user.email "bot@submarine.io"
          
          git add state.json
          
          if ! git diff --staged --quiet; then
            git commit -m "🔄 [Auto] Refresh security state - ${{ github.event.inputs.matrix_shard }} [skip ci]"
            git pull origin main --rebase || true
            git push origin HEAD:main
          else
            echo "✅ Cache integrity verified. No state mutation detected."
          fi

      - name: 🔄 Cascade Trigger (Phase 2)
        if: github.event.inputs.matrix_shard == 'shard_1.dat'
        run: |
          echo "[SYS_PIPELINE]: Shard 1 finished & state saved. Triggering Shard 2..."
          gh workflow run "🔄 System Cache Pipeline" -f matrix_shard=shard_2.dat --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🔄 Cascade Trigger (Phase 3)
        if: github.event.inputs.matrix_shard == 'shard_2.dat'
        run: |
          echo "[SYS_PIPELINE]: Shard 2 finished & state saved. Triggering Shard 3..."
          gh workflow run "🔄 System Cache Pipeline" -f matrix_shard=shard_3.dat --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
